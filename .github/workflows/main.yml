name: Build PDFs from root Markdown files

on:
  push:
  workflow_dispatch:

jobs:
  md_to_pdfs:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Prepare output directory
        run: |
          rm -rf output
          mkdir -p output

      - name: Convert each root Markdown to PDF (pandoc/latex docker)
        run: |
          set -eu

          files="$(find . -maxdepth 1 -type f -name "*.md" -printf "%f\n" | grep -vi "^README\.md$" || true)"
          if [ -z "$files" ]; then
            echo "No root Markdown files (*.md) found (excluding README.md)."
            exit 0
          fi

          echo "Markdown files to convert:"
          echo "$files"

          docker run --rm \
            --entrypoint /bin/sh \
            -v "$PWD:/data" \
            -w /data \
            pandoc/latex:3.5 \
            -lc '
              set -eu
              mkdir -p output
              files="$(find . -maxdepth 1 -type f -name "*.md" -printf "%f\n" | grep -vi "^README\.md$" || true)"
              for f in $files; do
                base="${f%.md}"
                out="output/${base}.pdf"
                echo "Converting $f -> $out"
                pandoc "$f" --pdf-engine=xelatex --output="$out"
              done
            '

      - name: Upload PDFs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: root_markdown_pdfs
          path: output
